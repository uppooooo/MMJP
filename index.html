<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MMO ドロップアイテム DB</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --border: #2a2a4a;
            --common: #b0b0b0;
            --uncommon: #4caf50;
            --rare: #2196f3;
            --epic: #9c27b0;
            --legendary: #ff9800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ヘッダー */
        .header {
            background: var(--bg-secondary);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .header .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* 検索エリア */
        .search-area {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px; /* iOS zoom防止 */
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        /* フィルター */
        .filters {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
        }

        .filter-btn:active {
            transform: scale(0.95);
        }

        /* ステータスバー */
        .status-bar {
            padding: 8px 16px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sync-info {
            font-size: 0.7rem;
        }

        /* アイテムリスト */
        .item-list {
            padding: 0 12px 24px;
        }

        .item-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            transition: transform 0.1s;
        }

        .item-card:active {
            transform: scale(0.98);
        }

        .item-card .monster-name {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .item-card .monster-name::before {
            content: '👾';
            font-size: 0.8rem;
        }

        .item-card .item-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .item-card .item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rarity-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .rarity-common { background: rgba(176,176,176,0.2); color: var(--common); }
        .rarity-uncommon { background: rgba(76,175,80,0.2); color: var(--uncommon); }
        .rarity-rare { background: rgba(33,150,243,0.2); color: var(--rare); }
        .rarity-epic { background: rgba(156,39,176,0.2); color: var(--epic); }
        .rarity-legendary { background: rgba(255,152,0,0.2); color: var(--legendary); }

        .drop-rate {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .drop-rate strong {
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .item-card .note {
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* ローディング */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* エラー */
        .error-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--accent);
        }

        .error-msg .icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        /* 空状態 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        /* フッター */
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>⚔️ MMO ドロップアイテム DB</h1>
        <p class="subtitle">モンスター別ドロップアイテム検索</p>
    </header>

    <div class="search-area">
        <div class="search-box">
            <input type="search" id="searchInput" placeholder="モンスター名 or アイテム名で検索..." autocomplete="off">
        </div>
        <div class="filters" id="rarityFilters">
            <button class="filter-btn active" data-rarity="all">全て</button>
            <button class="filter-btn" data-rarity="common">Common</button>
            <button class="filter-btn" data-rarity="uncommon">Uncommon</button>
            <button class="filter-btn" data-rarity="rare">Rare</button>
            <button class="filter-btn" data-rarity="epic">Epic</button>
            <button class="filter-btn" data-rarity="legendary">Legendary</button>
        </div>
    </div>

    <div class="status-bar">
        <span id="resultCount">読み込み中...</span>
        <span class="sync-info" id="syncInfo"></span>
    </div>

    <main class="item-list" id="itemList">
        <div class="loading">
            <div class="spinner"></div>
            <p>データを読み込み中...</p>
        </div>
    </main>

    <footer class="footer">
        <p>Data synced from Google Spreadsheet via Firestore</p>
    </footer>

    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // ===== Firebase設定 =====
        // ↓↓↓ ここを自分のFirebaseプロジェクトの値に書き換えてください ↓↓↓
        const firebaseConfig = {
  apiKey: "AIzaSyBQbmQPaXDjItAGQx0QBPpZKUXrByAHIXs",
  authDomain: "uppooooo.firebaseapp.com",
  projectId: "uppooooo",
  storageBucket: "uppooooo.firebasestorage.app",
  messagingSenderId: "299004426367",
  appId: "1:299004426367:web:64a30627d61b40da4de74a"
};
        // ↑↑↑ ここまで書き換え ↑↑↑

        // Firebase初期化
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ===== アプリケーション =====
        let allItems = [];
        let currentFilter = 'all';
        let currentSearch = '';

        // データ取得
        async function fetchItems() {
            try {
                const snapshot = await db.collection('drops').get();
                allItems = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                // ドロップ率で降順ソート
                allItems.sort((a, b) => (b.drop_rate || 0) - (a.drop_rate || 0));

                renderItems();
                fetchSyncInfo();

            } catch (error) {
                console.error('Fetch error:', error);
                showError(error.message);
            }
        }

        // 同期情報取得
        async function fetchSyncInfo() {
            try {
                const doc = await db.collection('metadata').doc('last_sync').get();
                if (doc.exists) {
                    const data = doc.data();
                    const date = new Date(data.synced_at);
                    const formatted = date.toLocaleDateString('ja-JP', {
                        month: 'short', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                    document.getElementById('syncInfo').textContent = '最終同期: ' + formatted;
                }
            } catch (e) {
                // 同期情報がなくてもエラーにしない
            }
        }

        // フィルタリング
        function getFilteredItems() {
            return allItems.filter(item => {
                // レアリティフィルター
                if (currentFilter !== 'all') {
                    if ((item.rarity || '').toLowerCase() !== currentFilter) {
                        return false;
                    }
                }
                // テキスト検索
                if (currentSearch) {
                    const search = currentSearch.toLowerCase();
                    const matchMonster = (item.monster_name || '').toLowerCase().includes(search);
                    const matchItem = (item.item_name || '').toLowerCase().includes(search);
                    const matchNote = (item.note || '').toLowerCase().includes(search);
                    return matchMonster || matchItem || matchNote;
                }
                return true;
            });
        }

        // レンダリング
        function renderItems() {
            const container = document.getElementById('itemList');
            const filtered = getFilteredItems();

            document.getElementById('resultCount').textContent = 
                filtered.length + '件' + (allItems.length !== filtered.length ? ' / ' + allItems.length + '件中' : '');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>該当するアイテムが見つかりません</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(item => {
                const rarityClass = 'rarity-' + (item.rarity || 'common').toLowerCase();
                return `
                    <div class="item-card">
                        <div class="monster-name">${escapeHtml(item.monster_name || '不明')}</div>
                        <div class="item-name">${escapeHtml(item.item_name || '不明なアイテム')}</div>
                        <div class="item-meta">
                            <span class="rarity-badge ${rarityClass}">${escapeHtml(item.rarity || 'Common')}</span>
                            <span class="drop-rate">Drop: <strong>${item.drop_rate || '?'}%</strong></span>
                        </div>
                        ${item.note ? `<div class="note">📝 ${escapeHtml(item.note)}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // エラー表示
        function showError(message) {
            const container = document.getElementById('itemList');
            container.innerHTML = `
                <div class="error-msg">
                    <div class="icon">⚠️</div>
                    <p>データの取得に失敗しました</p>
                    <p style="font-size:0.75rem; margin-top:8px; color:var(--text-secondary)">
                        ${escapeHtml(message)}<br><br>
                        firebaseConfig が正しく設定されているか確認してください。
                    </p>
                </div>
            `;
            document.getElementById('resultCount').textContent = 'エラー';
        }

        // XSS対策
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ===== イベントリスナー =====

        // 検索入力
        const searchInput = document.getElementById('searchInput');
        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentSearch = searchInput.value.trim();
                renderItems();
            }, 200);
        });

        // レアリティフィルター
        document.getElementById('rarityFilters').addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.rarity;
            renderItems();
        });

        // ===== 初期化 =====
        fetchItems();
    </script>
</body>
</html>
